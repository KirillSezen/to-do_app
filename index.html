<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="/src/styles/styles.css" type="text/css">
	<script src="/src/scripts/main.js"></script>
	<title>todo-app</title>
</head>
<body>
	
		<header>
			<p id="logo_1">TO</p>
			<p id="logo_2">DO</p>
		</header>

	<div class="content">

		

		<div class="add-container">

			<form onsubmit="addItem(); return false;"  id="add-form">
				<input required minlength="4" class="add-input" type="text" placeholder="Что делаем ?" >

			<button type="submit" class="add-button">Добавить</button>

			</form>


		</div>

		<div class="window">

			<div class="list">

			</div>

		</div>

		<div id="edit-window-1" class="edit-window">
			<p class="edit-label">Введите новое содержимое</p>
			<input id="edit-input-1" class="edit-input" type="text">

			<div>
				<button onclick="applyEdit()" id="edit-button-apply" class="edit-button">Применить</button>
				<button onclick="cancelEdit()" id="edit-button-cancel" class="edit-button">Отмена</button>
			</div>
		</div>

	</div>

</body>
</html>
